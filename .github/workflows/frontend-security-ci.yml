name: Frontend Security CI

on:
  push:
  pull_request:

jobs:
  frontend-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        continue-on-error: true
        run: npm audit --omit=dev
